[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/src/v0.8/",
    "@bisonai/orakl-contracts/=lib/orakl/contracts/",
    "@pythnetwork/pyth-sdk-solidity/=lib/pyth-sdk-solidity/",
]

[rpc_endpoints]
anvil  = "http://127.0.0.1:8545"
kairos = "https://public-en-kairos.node.kaia.io"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
